      - --local_ip=127.0.0.1
      - --port=9689
      - --ws_ip=127.0.0.1
      - --ws_http_port=19689
      - --log_dir=/logs
    depends_on:
      metad-a: { condition: service_healthy }
      metad-b: { condition: service_healthy }
      metad-c: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:19689/status"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: on-failure

  # ---- node1 (benchmark client / orchestrator) ------------------------------
  node1:
    build:
      context: .
      dockerfile: Dockerfile.cluster
    image: pdgraph-bench:cluster
    container_name: gb-node1
    network_mode: host
    working_dir: /app
    volumes:
      - ./results:/app/results
      - ./data/generated:/app/data/generated
      - /var/run/docker.sock:/var/run/docker.sock      # so the scale-out provisioner can docker compose
      - .:/app                                         # live source for development
    depends_on:
      graphd-a: { condition: service_healthy }
      graphd-b: { condition: service_healthy }
      graphd-c: { condition: service_healthy }
    command: ["sleep", "infinity"]
