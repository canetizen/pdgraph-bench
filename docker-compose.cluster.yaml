    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:19679/status"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: on-failure

  # ---- node4 (c) ------------------------------------------------------------
  metad-c:
    image: vesoft/nebula-metad:v3.8.0
    container_name: gb-metad-c
    network_mode: host
    command:
      - --meta_server_addrs=127.0.0.1:9559,127.0.0.1:9569,127.0.0.1:9579
      - --local_ip=127.0.0.1
      - --port=9579
      - --ws_ip=127.0.0.1
      - --ws_http_port=19579
      - --data_path=/data/meta
      - --log_dir=/logs
    volumes:
      - meta_data:/data/meta
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:19579/status"]
