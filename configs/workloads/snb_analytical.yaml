#
# Composite analytical workload for scenario S2 — pulls IC* parameters from the
# SNB Iv2 datagen output and Q* parameters from the SNB BI datagen output.

name: snb_analytical
queries:
  - IC1
  - IC3
  - IC5
  - IC6
  - Q1
  - Q2
  - Q6
  - Q11
parameter_source: data/generated/  # informational; per-ref dirs below
options:
  iv2_parameter_dir: data/generated/snb_iv2_sf1/parameters/
  bi_parameter_dir: data/generated/snb_bi_sf1/parameters/
