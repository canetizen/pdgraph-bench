# Created by: Mustafa Can Caliskan
# Date: 2026-04-25
#
# NebulaGraph endpoint. `host` and `meta_host` use the special `auto` value —
# the inventory-aware loader resolves them to the first sut node's hostname,
# so the same YAML drives both playground (localhost) and production (real
# hostnames from configs/inventory/cluster.yaml).

name: nebulagraph
image: vesoft/nebula-graphd:v3.8.0
endpoints:
  - host: auto
    port: 9669
options:
  host: auto
  port: 9669
  user: root
  password: nebula
  space: snb
  meta_host: auto
  meta_port: 9559
  pool_size: 32
