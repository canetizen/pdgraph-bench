#
# Dgraph endpoint. `host` (alpha) and `zero_host` use `auto` to resolve to the
# first sut node's hostname in the inventory; in the playground they collapse
# to localhost.

name: dgraph
image: dgraph/dgraph:v24.0.5
endpoints:
  - host: auto
    port: 9080
options:
  host: auto
  port: 9080
  zero_host: auto
  zero_port: 6080
