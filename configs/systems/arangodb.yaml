#
# ArangoDB endpoint. `host: auto` resolves to the first sut node's hostname in
# the inventory so the same YAML works for playground (localhost) and
# production (real hostnames).

name: arangodb
image: arangodb/arangodb:3.11.14
endpoints:
  - host: auto
    port: 8529
options:
  host: auto
  port: 8529
  user: root
  password: ""
  database: snb
