# Date: 2026-04-25
#
# JanusGraph endpoint. `host: auto` resolves to the first sut node's hostname
# in the inventory. Cassandra storage backend is provisioned as part of the
# JanusGraph compose bundle (one Cassandra peer per sut node).

name: janusgraph
image: janusgraph/janusgraph:1.0.0
endpoints:
  - host: auto
    port: 8182
options:
  host: auto
  port: 8182
  traversal_source: g
