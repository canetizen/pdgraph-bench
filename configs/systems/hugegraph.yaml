# Date: 2026-04-25
#
# HugeGraph endpoint. `host: auto` resolves to the first sut node's hostname
# in the inventory. Cassandra storage backend is shared with JanusGraph
# through a distinct keyspace; Tier-2 runs are scheduled in non-overlapping
# windows.

name: hugegraph
image: hugegraph/hugegraph:1.3.0
endpoints:
  - host: auto
    port: 8080
options:
  host: auto
  port: 8080
  graph: hugegraph
  timeout_s: 30.0
